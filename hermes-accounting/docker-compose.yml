  #     - "5000:5000"
  #   volumes:
  #     - ./hermes:/root/.hermes
  #   environment:
  #     - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
  #     - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
