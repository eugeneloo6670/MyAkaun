version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./hermes_accounting.db
      - HERMES_GATEWAY_URL=http://hermes:5000/api/chat
      - HERMES_MCP_URL=http://mcp:8001/mcp
    volumes:
      - ./data:/app/data
    depends_on:
      - mcp

  mcp:
    build: ./backend
    command: python mcp_serve.py
    ports:
      - "8001:8001"
    environment:
      - ACCOUNTING_API=http://backend:8000/api

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  # Hermes runs separately — point it at the MCP server
