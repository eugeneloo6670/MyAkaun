# Hermes Accounting — Agent Configuration

# MCP servers Hermes can call as tools
mcp_servers:
  hermes-accounting:
    url: http://localhost:8001/mcp
    description: "Full access to the Hermes Accounting ledger — record entries, query balances, lock periods"

# External skill directories
skills:
  external_dirs:
    - ./hermes/skills

# Messaging gateway (configure your own tokens in .env)
gateway:
  whatsapp:
    enabled: true
    # Set WHATSAPP_TOKEN in .env
  telegram:
    enabled: false
    # Set TELEGRAM_BOT_TOKEN in .env

# Cron jobs
cron:
  - schedule: "0 23 * * *"
    skill: nightly-accounting-review
    deliver_to: whatsapp

# Model — use any OpenRouter-supported model
model: openrouter:anthropic/claude-sonnet-4-5
# Fallback for high-volume routine tasks:
# model: openrouter:anthropic/claude-haiku-4-5

# Memory
memory:
  enabled: true
  provider: local
  path: ./hermes/memory
